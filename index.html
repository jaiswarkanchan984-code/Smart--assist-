<!DOCTYPE html>
<html>
<head>
<title>Care Support Website</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f2f2f2;
}

h1{
color:green;
}

button{
margin:10px;
padding:12px 20px;
background:green;
color:white;
border:none;
border-radius:6px;
font-size:16px;
}

.box{
margin-top:20px;
}

</style>
</head>

<body>

<h1>Care Support Website</h1>

<button onclick="showHome()">Home</button>
<button onclick="showContact()">Emergency</button>
<button onclick="showGame()">Game</button>

<div id="content" class="box"></div>

<script>

function showHome(){

document.getElementById("content").innerHTML=
`
<h2>Welcome</h2>

<p>This website is for Blind, Disabled and Old Age people.</p>

<button onclick="speak()">🔊 Speak</button>

<br><br>

<h3>Voice Control</h3>

<p>If you want voice control press Start button</p>

<button onclick="startVoice()">🎤 Start Voice</button>

<p id="voiceStatus"></p>
`;

}

function speak(){

const speech = new SpeechSynthesisUtterance(
"Welcome to Care Support Website"
);

speechSynthesis.speak(speech);

}

function startVoice(){

document.getElementById("voiceStatus").innerHTML="Voice listening...";

const recognition = new webkitSpeechRecognition();

recognition.onresult = function(event){

let text = event.results[0][0].transcript.toLowerCase();

if(text.includes("doctor")){
window.location.href="tel:9876543210";
}

if(text.includes("ambulance")){
window.location.href="tel:108";
}

if(text.includes("family")){
window.location.href="tel:9321748593";
}

};

recognition.start();

}

function showContact(){

document.getElementById("content").innerHTML=
`
<h2>Emergency Call</h2>

<a href="tel:9876543210">
<button>Call Doctor</button>
</a>

<a href="tel:108">
<button>Call Ambulance</button>
</a>

<a href="tel:9321748593">
<button>Call Family</button>
</a>
`;

}

let random = Math.floor(Math.random()*5)+1;

function showGame(){

document.getElementById("content").innerHTML=
`
<h2>Guess Game</h2>

<p>Guess number between 1 to 5</p>

<input id="guess">

<button onclick="check()">Check</button>

<p id="result"></p>
`;

}

function check(){

let g = document.getElementById("guess").value;

if(g==random)
document.getElementById("result").innerHTML="Correct!";
else
document.getElementById("result").innerHTML="Try Again!";

}

showHome();

</script>

</body>
</html>
